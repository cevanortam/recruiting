<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Resume Evaluation Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-6 md:p-12">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
        <div class="bg-slate-900 px-6 py-4 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">Resume Evaluation Assistant</h1>
                <p class="text-xs text-slate-400 mt-1">Local Browser Processing • Secure Data Isolation</p>
            </div>
            <div>
                <input type="password" id="apiKey" placeholder="Enter API Key (OpenAI/Gemini)" class="bg-slate-800 border border-slate-700 text-xs rounded px-3 py-1.5 w-64 focus:outline-none focus:border-indigo-500 text-white" />
            </div>
        </div>

        <div class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Candidate Name</label>
                        <input type="text" id="candidateName" placeholder="e.g., John Doe" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Target Job Title</label>
                        <input type="text" id="jobTitle" placeholder="e.g., Operations Supervisor" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Resume File (.pdf or .txt)</label>
                        <div class="flex items-center justify-center w-full">
                            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-lg cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                    <svg class="w-8 h-8 mb-3 text-slate-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/></svg>
                                    <p class="text-xs text-slate-500" id="fileStatus">Click to upload or drag & drop</p>
                                </div>
                                <input id="resumeFile" type="file" accept=".pdf,.txt" class="hidden" />
                            </label>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Job Description / Requirements</label>
                    <textarea id="jobDescription" placeholder="Paste the duties, core competencies, KPIs, and operational requirements here..." class="w-full flex-grow border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none min-h-[220px] resize-none"></textarea>
                </div>
            </div>

            <button id="evaluateBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg shadow dynamic-transition flex justify-center items-center gap-2">
                <span>Evaluate Application</span>
            </button>

            <div id="loading" class="hidden text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-300 border-t-indigo-600 mb-2"></div>
                <p class="text-sm text-slate-500">Parsing assets and generating local evaluation metrics...</p>
            </div>

            <div id="outputContainer" class="hidden space-y-6 border-t border-slate-200 pt-6">
                <h2 class="text-lg font-bold text-slate-900">Evaluation Analysis</h2>
                <div id="evaluationOutput" class="prose max-w-none text-sm text-slate-700 bg-slate-50 p-5 rounded-lg border border-slate-200 shadow-inner whitespace-pre-line leading-relaxed"></div>
            </div>
        </div>
    </div>

    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let extractedResumeText = "";

        // UI Element Selectors
        const fileInput = document.getElementById('resumeFile');
        const fileStatus = document.getElementById('fileStatus');
        const evaluateBtn = document.getElementById('evaluateBtn');
        const loading = document.getElementById('loading');
        const outputContainer = document.getElementById('outputContainer');
        const evaluationOutput = document.getElementById('evaluationOutput');

        // Handle File Upload and Text Extraction
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            fileStatus.innerText = `Selected: ${file.name}`;
            
            if (file.type === "application/pdf") {
                extractedResumeText = await extractTextFromPDF(file);
            } else {
                extractedResumeText = await file.text();
            }
        });

        // Local PDF Parsing Function
        async function extractTextFromPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(" ");
                fullText += pageText + "\n";
            }
            return fullText;
        }

        // Trigger AI Evaluation Engine
        evaluateBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const candidateName = document.getElementById('candidateName').value.trim();
            const jobTitle = document.getElementById('jobTitle').value.trim();
            const jobDescription = document.getElementById('jobDescription').value.trim();

            if (!apiKey) return alert("Please supply an API key in the top right window for local browser calculations.");
            if (!jobTitle || !jobDescription || !extractedResumeText) return alert("Please provide Job Title, Description, and a valid Resume file.");

            // Reset Output Display
            loading.classList.remove('hidden');
            outputContainer.classList.add('hidden');
            evaluationOutput.innerHTML = "";

            // Construct evaluation payload instructions
            const prompt = `
You are an expert HR Data Analyst and Recruiter. Evaluate the following resume for the target role.

### METADATA
- Candidate Name: ${candidateName || "Not Specified"}
- Target Job Title: ${jobTitle}

### CONTEXT FOR EVALUATION
- Job Description:
${jobDescription}

- Candidate Resume:
${extractedResumeText}

### MANDATORY OUTPUT STRUCTURE
Please return your entire analysis formatted cleanly using Markdown.

## 1. Executive Summary & Fit Overview
[Provide a clear narrative assessment of overall technical fit, tenure relevance, and background match.]

## 2. Core Competency Scores (Scale: 1-5)
[Break down 3-5 core competencies required by the job description. Score each 1-5 with a 1-sentence analytical reason based strictly on the candidate's resume history.]

## 3. Position-Specific Performance Questions
[Generate exactly 3 deep-dive interview questions checking practical, technical, or procedural experience directly relative to the core operations mentioned in the Job Description.]
1. 
2. 
3. 

## 4. Psychological & Mindset Discovery Questions
[Generate exactly 3 behavioral, mental resilience, or situation-handling questions tailored to probe how they handle stress, prioritization friction, or structural challenges implicit in this specific role.]
1. 
2. 
3. 
            `;

            try {
                // Utilizing direct fetch to OpenAI API endpoint architecture natively
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini", // Cost-efficient, high accuracy context engine
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.3
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || "Inbound API Pipeline Breakdown");
                }

                const data = await response.json();
                const textResult = data.choices[0].message.content;

                // Format simple markdown blocks into HTML structure
                evaluationOutput.innerHTML = formatMarkdown(textResult);
                outputContainer.classList.remove('hidden');

            } catch (error) {
                alert("Error during processing evaluation: " + error.message);
            } finally {
                loading.classList.add('hidden');
            }
        });

        // Mini parser to safely render basic markdown structure back to browser window
        function formatMarkdown(text) {
            return text
                .replace(/^## (.*$)/gim, '<h3 class="text-md font-bold text-slate-900 mt-4 mb-2">$1</h3>')
                .replace(/^### (.*$)/gim, '<h4 class="text-sm font-semibold text-slate-800 mt-2">$1</h4>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/^\s*[\-\*]\s+(.*)$/gim, '<li class="ml-4 list-disc">$1</li>');
        }
    </script>
</body>
</html>
